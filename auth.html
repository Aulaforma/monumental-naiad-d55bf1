<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | Aula Forma</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { overflow: auto; display: block; background-color: #f8fafc; }
        .auth-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { background: white; padding: 3rem; border-radius: var(--radius-xl); box-shadow: var(--shadow-md); width: 100%; max-width: 450px; border: 1px solid var(--border); }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header .logo-icon-box { margin: 0 auto 1rem auto; width: 48px; height: 48px; background: linear-gradient(135deg, #5c60f5, #7f56d9); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .auth-header h1 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; }
        .auth-btn { width: 100%; padding: 0.75rem; border-radius: var(--radius-md); font-weight: 600; font-size: 1rem; margin-top: 1rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
        .auth-switch { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-switch a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
        .auth-switch a:hover { text-decoration: underline; }
        .hidden { display: none !important; }
        
        .legal-checkbox { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 1.5rem; margin-top: 1.5rem; }
        .legal-checkbox input[type="checkbox"] { margin-top: 0.25rem; }
        .legal-checkbox label { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; font-weight: normal; }
        .legal-checkbox label a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .alert { padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; font-size: 0.9rem; display: none; }
        .alert-error { background-color: #fef2f2; color: #ef4444; border: 1px solid #fca5a5; }
        .alert-success { background-color: #f0fdf4; color: #22c55e; border: 1px solid #86efac; }
    </style>
</head>
<body>
    <a href="index.html" style="position: absolute; top: 1.5rem; left: 1.5rem; text-decoration: none; color: #64748b; display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.95rem; transition: color 0.2s;" onmouseover="this.style.color='#4f46e5'" onmouseout="this.style.color='#64748b'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Volver al inicio
    </a>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon-box">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/><path d="M12 7v14M9 11l3 3 6-6"/></svg>
                </div>
                <h1 id="auth-title">Iniciar sesión</h1>
                <p id="auth-subtitle">Ingresa a tu cuenta de Aula Forma</p>
            </div>

            <div id="auth-alert" class="alert"></div>

            <!-- Formularios -->
            <form id="auth-form">
                
                <!-- Campos solo para Registro -->
                <div id="register-fields" class="hidden">
                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej. Sofía Muñoz">
                    </div>
                    <div class="form-group">
                        <label for="tipo_usuario">Tipo de usuario</label>
                        <select id="tipo_usuario" class="form-control">
                            <option value="Docente">Docente</option>
                            <option value="UTP">UTP / Coordinador</option>
                            <option value="Directivo">Directivo</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>

                <!-- Campos Comunes -->
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>

                <!-- Confirmar contraseña solo para Registro -->
                <div id="confirm-password-field" class="form-group hidden">
                    <label for="confirm_password">Confirmar contraseña</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="••••••••">
                </div>

                <!-- Casilla Legal -->
                <div id="legal-container" class="legal-checkbox hidden">
                    <input type="checkbox" id="legal_check">
                    <label for="legal_check">
                        He leído y aceptado los <a href="terminos.html" target="_blank">Términos y Condiciones</a>, la <a href="privacidad.html" target="_blank">Política de Privacidad</a> y la <a href="pagos.html" target="_blank">Política de Pagos y Devoluciones</a>.
                    </label>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary auth-btn">Iniciar sesión</button>
            </form>

            <div class="auth-switch">
                <span id="switch-text">¿No tienes cuenta?</span> 
                <a id="btn-switch-mode">Crear cuenta gratis</a>
            </div>
            
            <div id="forgot-password-container" class="auth-switch" style="margin-top: 1rem;">
                <a href="#" id="btn-forgot-password" style="font-weight: normal;">Olvidé mi contraseña</a>
            </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script>
        const authForm = document.getElementById('auth-form');
        const registerFields = document.getElementById('register-fields');
        const confirmPasswordField = document.getElementById('confirm-password-field');
        const legalContainer = document.getElementById('legal-container');
        const forgotPasswordContainer = document.getElementById('forgot-password-container');
        
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const btnSubmit = document.getElementById('btn-submit');
        const switchText = document.getElementById('switch-text');
        const btnSwitchMode = document.getElementById('btn-switch-mode');
        const authAlert = document.getElementById('auth-alert');

        let isLoginMode = true;

        function translateError(msg) {
            if (!msg) return 'Ocurrió un error inesperado.';
            const lower = msg.toLowerCase();
            if (lower.includes('email not confirmed')) {
                return 'Debes confirmar tu correo electrónico antes de ingresar. Por favor, revisa tu bandeja de entrada o la carpeta de spam.';
            }
            if (lower.includes('invalid login credentials') || lower.includes('invalid credentials')) {
                return 'El correo electrónico o la contraseña son incorrectos.';
            }
            if (lower.includes('user already registered') || lower.includes('email already in use')) {
                return 'Este correo electrónico ya está registrado. Intenta iniciar sesión.';
            }
            if (lower.includes('password should be at least')) {
                return 'La contraseña debe tener al menos 6 caracteres.';
            }
            if (lower.includes('email signups are disabled')) {
                return 'El registro por correo electrónico está desactivado temporalmente en el servidor.';
            }
            return msg;
        }

        function showAlert(msg, isError = false) {
            authAlert.textContent = isError ? translateError(msg) : msg;
            authAlert.style.display = 'block';
            authAlert.className = isError ? 'alert alert-error' : 'alert alert-success';
        }

        function hideAlert() {
            authAlert.style.display = 'none';
        }

        btnSwitchMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            hideAlert();
            if (isLoginMode) {
                // Modo Login
                registerFields.classList.add('hidden');
                confirmPasswordField.classList.add('hidden');
                legalContainer.classList.add('hidden');
                forgotPasswordContainer.classList.remove('hidden');
                
                authTitle.textContent = 'Iniciar sesión';
                authSubtitle.textContent = 'Ingresa a tu cuenta de Aula Forma';
                btnSubmit.textContent = 'Iniciar sesión';
                switchText.textContent = '¿No tienes cuenta?';
                btnSwitchMode.textContent = 'Crear cuenta gratis';
                
                document.getElementById('nombre').removeAttribute('required');
                document.getElementById('confirm_password').removeAttribute('required');
                document.getElementById('legal_check').removeAttribute('required');
                
                // Habilitar el botón siempre para Iniciar Sesión
                btnSubmit.disabled = false;
            } else {
                // Modo Registro
                registerFields.classList.remove('hidden');
                confirmPasswordField.classList.remove('hidden');
                legalContainer.classList.remove('hidden');
                forgotPasswordContainer.classList.add('hidden');
                
                authTitle.textContent = 'Crear cuenta';
                authSubtitle.textContent = 'Crea tu cuenta gratis y recibe 1 crédito inicial para generar tu primer documento Word en Aula Forma.';
                btnSubmit.textContent = 'Crear cuenta gratis';
                switchText.textContent = '¿Ya tienes cuenta?';
                btnSwitchMode.textContent = 'Iniciar sesión';
                
                document.getElementById('nombre').setAttribute('required', 'true');
                document.getElementById('confirm_password').setAttribute('required', 'true');
                document.getElementById('legal_check').setAttribute('required', 'true');
                
                // Deshabilitar botón hasta que acepten términos
                btnSubmit.disabled = !document.getElementById('legal_check').checked;
            }
        });

        // Escuchar el checkbox para habilitar el botón
        document.getElementById('legal_check').addEventListener('change', (e) => {
            if (!isLoginMode) {
                btnSubmit.disabled = !e.target.checked;
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Procesando...';

            try {
                if (isLoginMode) {
                    // Iniciar Sesión
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) {
                        showAlert(error.message, true);
                    } else {
                        showAlert('Inicio de sesión exitoso. Redirigiendo...');
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    // Registro
                    const nombre = document.getElementById('nombre').value;
                    const tipo_usuario = document.getElementById('tipo_usuario').value;
                    const confirmPassword = document.getElementById('confirm_password').value;
                    const legalCheck = document.getElementById('legal_check').checked;

                    if (password !== confirmPassword) {
                        showAlert('Las contraseñas no coinciden', true);
                        btnSubmit.disabled = false;
                        btnSubmit.textContent = 'Crear cuenta gratis';
                        return;
                    }

                    if (!legalCheck) {
                        showAlert('Debes aceptar los términos y condiciones', true);
                        btnSubmit.disabled = false;
                        btnSubmit.textContent = 'Crear cuenta gratis';
                        return;
                    }

                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: {
                            data: {
                                nombre_completo: nombre,
                                tipo_usuario: tipo_usuario
                            }
                        }
                    });

                    if (error) {
                        showAlert(error.message, true);
                    } else {
                        const session = data?.session;
                        if (session) {
                            showAlert('Cuenta creada correctamente. Hemos agregado 1 crédito gratuito para que pruebes Aula Forma. Redirigiendo...', false);
                            setTimeout(() => {
                                window.location.href = 'dashboard.html';
                            }, 2500);
                        } else {
                            showAlert('¡Registro exitoso! Hemos enviado un correo de confirmación a tu email. Por favor, confírmalo para poder ingresar a tu cuenta.', false);
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                showAlert('Error inesperado: ' + err.message, true);
            }
            
            if(!authAlert.textContent.includes('Redirigiendo')) {
                btnSubmit.disabled = false;
                btnSubmit.textContent = isLoginMode ? 'Iniciar sesión' : 'Crear cuenta gratis';
            }
        });
        
        // Modo simulación: autocompletar credenciales y mostrar aviso
        if (window.isMockMode) {
            showAlert('Modo Simulación Local Activo. Credenciales de prueba auto-completadas.', false);
            document.getElementById('email').value = 'docente.pruebas@aulaforma.cl';
            document.getElementById('password').value = '123456';
        }

        // Redirigir si ya está logueado
        getCurrentSession().then(session => {
            if(session) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
